<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>EspigaPedidos - Iniciar Sesión</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --espiga-dark:   #5c2e00;
            --espiga-main:   #8b4513;
            --espiga-mid:    #a0522d;
            --espiga-light:  #d4956a;
            --espiga-bg:     #f5ede4;
            --espiga-cream:  #fdf6ee;
        }
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; }
        body {
            background: linear-gradient(135deg, var(--espiga-bg) 0%, #e8d5c0 100%);
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; font-family: 'Segoe UI', sans-serif;
        }
        .login-wrapper {
            width: 100%; max-width: 420px; padding: 1.5rem;
        }
        .login-card {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(92,46,0,.18);
            overflow: hidden;
        }
        .login-header {
            background: linear-gradient(160deg, var(--espiga-dark) 0%, var(--espiga-main) 100%);
            padding: 2.2rem 2rem 1.8rem;
            text-align: center;
        }
        .logo-circle {
            width: 72px; height: 72px;
            background: rgba(255,255,255,.15);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1rem;
            border: 2px solid rgba(255,255,255,.3);
        }
        .logo-circle svg { width: 40px; height: 40px; }
        .login-header h1 {
            color: #fff; font-size: 1.45rem; font-weight: 700;
            margin: 0; letter-spacing: .3px;
        }
        .login-header p {
            color: rgba(255,255,255,.75); font-size: .85rem; margin: .3rem 0 0;
        }
        .login-body { padding: 2rem; }
        .form-label {
            font-weight: 600; font-size: .82rem;
            color: var(--espiga-dark); text-transform: uppercase; letter-spacing: .5px;
        }
        .input-group-text {
            background: var(--espiga-bg); border-color: #ddd; color: var(--espiga-mid);
        }
        .form-control {
            border-color: #ddd; background: var(--espiga-cream);
            font-size: .93rem;
        }
        .form-control:focus {
            border-color: var(--espiga-light);
            box-shadow: 0 0 0 3px rgba(160,82,45,.15);
            background: #fff;
        }
        .btn-login {
            background: linear-gradient(135deg, var(--espiga-dark), var(--espiga-main));
            color: #fff; border: none; font-weight: 600;
            padding: .75rem; border-radius: 10px; font-size: .97rem;
            transition: opacity .2s, transform .15s;
        }
        .btn-login:hover { opacity: .9; transform: translateY(-1px); color: #fff; }
        .alert { font-size: .88rem; border-radius: 10px; }
    </style>
</head>
<body>
<div class="login-wrapper">
    <div class="login-card">
        <div class="login-header">
            <div class="logo-circle">
                <!-- Espiga SVG icon -->
                <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <line x1="20" y1="36" x2="20" y2="8" stroke="white" stroke-width="2" stroke-linecap="round"/>
                    <ellipse cx="20" cy="10" rx="4" ry="6" fill="white" opacity=".9" transform="rotate(-30 20 10)"/>
                    <ellipse cx="20" cy="10" rx="4" ry="6" fill="white" opacity=".9" transform="rotate(30 20 10)"/>
                    <ellipse cx="20" cy="16" rx="4" ry="6" fill="white" opacity=".8" transform="rotate(-35 20 16)"/>
                    <ellipse cx="20" cy="16" rx="4" ry="6" fill="white" opacity=".8" transform="rotate(35 20 16)"/>
                    <ellipse cx="20" cy="22" rx="3.5" ry="5.5" fill="white" opacity=".7" transform="rotate(-40 20 22)"/>
                    <ellipse cx="20" cy="22" rx="3.5" ry="5.5" fill="white" opacity=".7" transform="rotate(40 20 22)"/>
                    <line x1="14" y1="36" x2="20" y2="32" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
                    <line x1="26" y1="36" x2="20" y2="32" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
            </div>
            <h1>Panificadora Espiga de Trigo</h1>
            <p>Sistema de Gestión de Pedidos</p>
        </div>

        <div class="login-body">
            <div th:if="${param.error}" class="alert alert-danger py-2">
                <i class="bi bi-exclamation-triangle me-1"></i> Usuario o contraseña incorrectos.
            </div>
            <div th:if="${param.logout}" class="alert alert-success py-2">
                <i class="bi bi-check-circle me-1"></i> Sesión cerrada correctamente.
            </div>

            <form th:action="@{/login}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="mb-3">
                    <label class="form-label">Usuario</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" name="username" class="form-control" placeholder="Ingrese su usuario" required autofocus>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" name="password" class="form-control" placeholder="Ingrese su contraseña" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-login w-100">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar Sesión
                </button>

                <div style="text-align:center;margin-top:1rem;">
                    <a href="/reset/solicitar"
                       style="font-size:.83rem;color:#8b4513;text-decoration:none;font-weight:500;">
                        <i class="bi bi-key me-1"></i>¿Olvidaste tu contraseña?
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
