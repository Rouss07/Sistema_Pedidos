<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Solicitudes de Reset</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root{--ep-dark:#5c2e00;--ep-main:#8b4513;--ep-light:#d4956a;--ep-cream:#f5ede4;--sw:240px;}
        *{box-sizing:border-box;}
        body{margin:0;background:#f4f0eb;font-family:'Segoe UI',sans-serif;display:flex;min-height:100vh;}
        .sidebar{width:var(--sw);background:linear-gradient(180deg,var(--ep-dark) 0%,var(--ep-main) 100%);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;}
        .sb-brand{display:flex;align-items:center;gap:.7rem;padding:1.3rem 1.1rem .9rem;border-bottom:1px solid rgba(255,255,255,.12);}
        .sb-logo{width:34px;height:34px;}
        .sb-txt{color:#fff;line-height:1.25;}
        .sb-txt strong{font-size:.9rem;display:block;font-weight:700;}
        .sb-txt small{font-size:.69rem;opacity:.65;}
        .sb-nav{flex:1;padding:.7rem 0;}
        .sb-sec{padding:.45rem 1.1rem .15rem;font-size:.63rem;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.38);font-weight:700;}
        .sb-link{display:flex;align-items:center;gap:.65rem;padding:.57rem 1.1rem;color:rgba(255,255,255,.78);text-decoration:none;font-size:.86rem;font-weight:500;transition:background .15s;}
        .sb-link:hover{background:rgba(255,255,255,.12);color:#fff;}
        .sb-link.active{background:rgba(255,255,255,.18);color:#fff;font-weight:600;}
        .sb-footer{padding:.9rem 1.1rem;border-top:1px solid rgba(255,255,255,.1);}
        .btn-logout{display:flex;align-items:center;gap:.55rem;width:100%;padding:.5rem .85rem;background:rgba(255,255,255,.1);color:rgba(255,255,255,.82);border:1px solid rgba(255,255,255,.2);border-radius:8px;font-size:.83rem;font-weight:500;cursor:pointer;text-decoration:none;}
        .btn-logout:hover{background:rgba(255,255,255,.2);color:#fff;}
        .main-wrap{margin-left:var(--sw);flex:1;display:flex;flex-direction:column;}
        .topbar{background:#fff;padding:.8rem 1.6rem;border-bottom:1px solid #e8ddd4;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
        .topbar-title{font-size:1.05rem;font-weight:700;color:var(--ep-dark);}
        .main-content{padding:1.6rem;flex:1;}
        .card-panel{background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(92,46,0,.07);overflow:hidden;}
        .card-head{padding:1rem 1.4rem;border-bottom:1px solid #f0e8df;display:flex;align-items:center;gap:.5rem;}
        .card-head h5{margin:0;font-weight:700;color:var(--ep-dark);font-size:.95rem;}
        .tbl{width:100%;border-collapse:collapse;}
        .tbl thead th{background:var(--ep-cream);color:var(--ep-dark);font-size:.73rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:.75rem 1rem;border-bottom:2px solid #e8ddd4;}
        .tbl tbody td{padding:.8rem 1rem;border-bottom:1px solid #f5ede4;font-size:.87rem;color:#444;vertical-align:middle;}
        .tbl tbody tr:hover{background:#fdf9f5;}
        .f-ctrl{border:1.5px solid #ddd;border-radius:7px;padding:.4rem .7rem;font-size:.85rem;background:#fdf9f5;outline:none;width:160px;}
        .f-ctrl:focus{border-color:var(--ep-light);}
        .btn-ep{background:linear-gradient(135deg,var(--ep-dark),var(--ep-main));color:#fff;border:none;border-radius:8px;padding:.38rem .85rem;font-size:.82rem;font-weight:600;cursor:pointer;}
        .btn-ep:hover{opacity:.88;}
        .empty{text-align:center;color:#aaa;padding:2.5rem;}
        .badge-pend{background:#fff3cd;color:#856404;padding:.22rem .6rem;border-radius:20px;font-size:.71rem;font-weight:600;}
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="sb-brand">
        <svg class="sb-logo" viewBox="0 0 36 36" fill="none">
            <circle cx="18" cy="18" r="18" fill="rgba(255,255,255,0.12)"/>
            <line x1="18" y1="32" x2="18" y2="7" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
            <ellipse cx="18" cy="9.5" rx="3.2" ry="4.8" fill="white" opacity=".9" transform="rotate(-30 18 9.5)"/>
            <ellipse cx="18" cy="9.5" rx="3.2" ry="4.8" fill="white" opacity=".9" transform="rotate(30 18 9.5)"/>
            <ellipse cx="18" cy="15" rx="3" ry="4.5" fill="white" opacity=".8" transform="rotate(-35 18 15)"/>
            <ellipse cx="18" cy="15" rx="3" ry="4.5" fill="white" opacity=".8" transform="rotate(35 18 15)"/>
            <ellipse cx="18" cy="20.5" rx="2.8" ry="4.2" fill="white" opacity=".7" transform="rotate(-40 18 20.5)"/>
            <ellipse cx="18" cy="20.5" rx="2.8" ry="4.2" fill="white" opacity=".7" transform="rotate(40 18 20.5)"/>
        </svg>
        <div class="sb-txt">
            <strong>Espiga de Trigo</strong>
            <small>Gestión de Pedidos</small>
        </div>
    </div>
    <nav class="sb-nav">
        <div class="sb-sec">Principal</div>
        <a th:href="@{/}" class="sb-link"><i class="bi bi-grid-1x2"></i> Dashboard</a>
        <div class="sb-sec">Operaciones</div>
        <a th:href="@{/pedidos}" class="sb-link"><i class="bi bi-bag"></i> Pedidos</a>
        <a th:href="@{/pedidos-especiales}" class="sb-link"><i class="bi bi-stars"></i> Pedidos Especiales</a>
        <div class="sb-sec">Administración</div>
        <a th:href="@{/productos}" class="sb-link"><i class="bi bi-box-seam"></i> Productos</a>
        <a th:href="@{/tiendas}" class="sb-link"><i class="bi bi-shop"></i> Tiendas</a>
        <a th:href="@{/usuarios}" class="sb-link"><i class="bi bi-people"></i> Usuarios</a>
        <a th:href="@{/reset/admin/solicitudes}" class="sb-link active">
            <i class="bi bi-key"></i> Solicitudes Reset
        </a>
    </nav>
    <div class="sb-footer">
        <form th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="btn-logout">
                <i class="bi bi-box-arrow-left"></i> Cerrar Sesión
            </button>
        </form>
    </div>
</aside>

<div class="main-wrap">
    <div class="topbar">
        <div class="topbar-title">Solicitudes de Restablecimiento</div>
    </div>
    <div class="main-content">
        <div class="card-panel">
            <div class="card-head">
                <i class="bi bi-key" style="color:#8b4513;"></i>
                <h5>Solicitudes pendientes</h5>
            </div>
            <div style="overflow-x:auto;">
                <table class="tbl">
                    <thead>
                    <tr>
                        <th>#</th>
                        <th>Usuario</th>
                        <th>Mensaje</th>
                        <th>Fecha</th>
                        <th>Nueva contraseña</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="s : ${solicitudes}">
                        <td style="font-weight:600;color:#8b4513;" th:text="${s.id}"></td>
                        <td>
                            <code style="background:#f5ede4;padding:.15rem .4rem;border-radius:5px;"
                                  th:text="${s.username}"></code>
                        </td>
                        <td style="max-width:220px;color:#666;" th:text="${s.mensaje}"></td>
                        <td style="font-size:.82rem;color:#999;" th:text="${s.fecha}"></td>
                        <td>
                            <form th:action="@{/reset/admin/resetear}" method="post"
                                  style="display:flex;gap:.4rem;align-items:center;">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <input type="hidden" name="solicitudId" th:value="${s.id}">
                                <input type="password" name="nuevaPassword" class="f-ctrl"
                                       placeholder="Nueva contraseña" required minlength="4">
                                <button type="submit" class="btn-ep">
                                    <i class="bi bi-check-lg"></i> Resetear
                                </button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(solicitudes)}">
                        <td colspan="5" class="empty">
                            <i class="bi bi-check-circle" style="font-size:2rem;display:block;color:#0a3622;margin-bottom:.5rem;"></i>
                            No hay solicitudes pendientes
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

</body>
</html>
