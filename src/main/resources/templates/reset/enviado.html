<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Solicitud enviada</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root{--ep-dark:#5c2e00;--ep-main:#8b4513;}
        body{background:linear-gradient(135deg,#f5ede4 0%,#e8d5c0 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Segoe UI',sans-serif;}
        .card{border:none;border-radius:20px;box-shadow:0 20px 60px rgba(92,46,0,.18);max-width:420px;width:100%;padding:2.5rem;text-align:center;}
        .check{width:70px;height:70px;background:#d1e7dd;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.2rem;font-size:2rem;color:#0a3622;}
        .btn-ep{background:linear-gradient(135deg,var(--ep-dark),var(--ep-main));color:#fff;border:none;border-radius:9px;padding:.6rem 1.4rem;font-size:.9rem;font-weight:600;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:.4rem;}
    </style>
</head>
<body>
<div class="card">
    <div class="check"><i class="bi bi-check-lg"></i></div>
    <h5 style="font-weight:700;color:#5c2e00;margin-bottom:.5rem;">¡Solicitud enviada!</h5>
    <p style="color:#777;font-size:.88rem;margin-bottom:1.5rem;">
        Tu solicitud fue registrada. El administrador restablecerá tu contraseña y podrás ingresar pronto.
    </p>
    <a href="/login" class="btn-ep"><i class="bi bi-arrow-left"></i> Volver al login</a>
</div>
</body>
</html>
