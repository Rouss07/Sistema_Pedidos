<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Olvidé mi contraseña</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root{--ep-dark:#5c2e00;--ep-main:#8b4513;}
        body{background:linear-gradient(135deg,#f5ede4 0%,#e8d5c0 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Segoe UI',sans-serif;}
        .card{border:none;border-radius:20px;box-shadow:0 20px 60px rgba(92,46,0,.18);max-width:440px;width:100%;}
        .card-header{background:linear-gradient(160deg,var(--ep-dark),var(--ep-main));border-radius:20px 20px 0 0;padding:2rem;text-align:center;color:#fff;}
        .logo{width:60px;height:60px;background:rgba(255,255,255,.15);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:1.6rem;}
        .card-body{padding:2rem;}
        .f-label{font-weight:600;font-size:.79rem;color:var(--ep-dark);text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:.3rem;}
        .f-ctrl{border:1.5px solid #ddd;border-radius:9px;padding:.58rem .88rem;font-size:.9rem;background:#fdf9f5;width:100%;outline:none;transition:border-color .15s;}
        .f-ctrl:focus{border-color:#d4956a;box-shadow:0 0 0 3px rgba(160,82,45,.12);background:#fff;}
        .btn-ep{background:linear-gradient(135deg,var(--ep-dark),var(--ep-main));color:#fff;border:none;border-radius:9px;padding:.6rem 1.2rem;font-size:.9rem;font-weight:600;width:100%;cursor:pointer;transition:opacity .18s;}
        .btn-ep:hover{opacity:.88;}
        .btn-back{display:inline-flex;align-items:center;gap:.4rem;color:var(--ep-main);text-decoration:none;font-size:.85rem;font-weight:500;margin-bottom:1.2rem;}
        .btn-back:hover{color:var(--ep-dark);}
    </style>
</head>
<body>
<div class="card">
    <div class="card-header">
        <div class="logo"><i class="bi bi-key"></i></div>
        <h5 style="margin:0;font-weight:700;">Olvidé mi contraseña</h5>
        <p style="margin:.3rem 0 0;opacity:.75;font-size:.85rem;">El administrador restablecerá tu acceso</p>
    </div>
    <div class="card-body">
        <a href="/login" class="btn-back"><i class="bi bi-arrow-left"></i> Volver al login</a>

        <form th:action="@{/reset/solicitar}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div style="margin-bottom:1rem;">
                <label class="f-label">Tu usuario</label>
                <input type="text" name="username" class="f-ctrl" placeholder="Ingresa tu nombre de usuario" required>
            </div>

            <div style="margin-bottom:1.3rem;">
                <label class="f-label">Mensaje al administrador</label>
                <textarea name="mensaje" class="f-ctrl" rows="3"
                          placeholder="Ej: No puedo ingresar desde ayer, soy la tienda Centro..."></textarea>
            </div>

            <button type="submit" class="btn-ep">
                <i class="bi bi-send me-2"></i>Enviar solicitud
            </button>
        </form>
    </div>
</div>
</body>
</html>
